<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#111827" />
  <title>Badminton Scoreboard</title>

  <style>
    :root {
      --bg: #0b1020;
      --text: #f8fafc;
      --muted: rgba(248,250,252,.72);
      --line: rgba(255,255,255,.16);
      --left-1: #4338ca;
      --left-2: #2563eb;
      --right-1: #e11d48;
      --right-2: #fb7185;
      --green: #34d399;
      --shadow: 0 24px 80px rgba(0,0,0,.35);
      --radius: 26px;
      --hud-safe: 54px;
      --top-safe: 62px;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
  
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
  
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
    }
  
    body {
      user-select: none;
      touch-action: manipulation;
      overscroll-behavior: none;
    }
  
    button,
    input {
      font: inherit;
    }
  
    button {
      border: 0;
      color: inherit;
      cursor: pointer;
    }
  
    .app {
      width: 100vw;
      height: 100dvh;
      min-height: 100vh;
      overflow: hidden;
      background:
        radial-gradient(circle at top left, rgba(67,56,202,.48), transparent 36%),
        radial-gradient(circle at bottom right, rgba(225,29,72,.46), transparent 38%),
        linear-gradient(135deg, #070b17 0%, #111827 100%);
    }
  
    .screen {
      display: none;
      width: 100%;
      height: 100%;
    }
  
    .screen.active {
      display: flex;
    }
  
    /* =========================
       HOME / SETUP
    ========================== */
  
    .setup-screen {
      overflow: hidden;
      padding:
        calc(env(safe-area-inset-top, 0px) + 10px)
        calc(env(safe-area-inset-right, 0px) + 14px)
        calc(env(safe-area-inset-bottom, 0px) + 14px)
        calc(env(safe-area-inset-left, 0px) + 14px);
      justify-content: center;
      align-items: stretch;
    }
  
    .setup-wrap {
      width: min(100%, 1080px);
      height: 100%;
      min-height: 0;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 12px;
      margin: 0 auto;
    }
  
    .hero {
      min-height: 0;
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(135deg, rgba(255,255,255,.13), rgba(255,255,255,.06));
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      overflow: hidden;
    }
  
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      max-width: 100%;
      padding: 7px 12px;
      margin-bottom: 10px;
      border-radius: 999px;
      background: rgba(255,255,255,.11);
      color: var(--muted);
      font-size: 12px;
      letter-spacing: .08em;
      text-transform: uppercase;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
  
    .hero h1 {
      margin: 0 0 6px;
      font-size: clamp(30px, 7.2vw, 54px);
      line-height: .96;
      letter-spacing: -0.06em;
    }
  
    .hero p {
      margin: 0;
      color: var(--muted);
      font-size: clamp(13px, 2.8vw, 16px);
      line-height: 1.45;
    }
  
    .setup-card {
      min-height: 0;
      overflow: hidden;
      display: grid;
      grid-template-rows: auto auto auto auto;
      gap: 12px;
      align-content: start;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(15,23,42,.62);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }
  
    .name-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }
  
    .option-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
  
    .field {
      min-width: 0;
      display: grid;
      gap: 7px;
    }
  
    .label {
      padding-left: 2px;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
  
    .input {
      width: 100%;
      min-height: 50px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 18px;
      outline: none;
      color: var(--text);
      background: rgba(255,255,255,.10);
    }
  
    .input:focus {
      border-color: rgba(147,197,253,.8);
      box-shadow: 0 0 0 4px rgba(59,130,246,.18);
    }
  
    .seg {
      display: grid;
      grid-template-columns: repeat(var(--cols, 2), 1fr);
      gap: 8px;
    }
  
    .seg button {
      min-height: 50px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.08);
      color: var(--muted);
      font-weight: 850;
      font-size: clamp(15px, 2vw, 17px);
    }
  
    .seg button.active {
      color: white;
      border-color: transparent;
      background: linear-gradient(135deg, rgba(99,102,241,.95), rgba(59,130,246,.9));
      box-shadow: 0 12px 28px rgba(37,99,235,.27);
    }
  
    .rule-box {
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: rgba(255,255,255,.07);
      color: var(--muted);
      line-height: 1.5;
      font-size: 13.5px;
    }
  
    .rule-box b {
      color: var(--text);
    }
  
    .start-btn {
      width: 100%;
      min-height: 56px;
      border-radius: 20px;
      font-size: 19px;
      font-weight: 950;
      background: linear-gradient(135deg, #4f46e5, #ec4899);
      box-shadow: 0 18px 48px rgba(236,72,153,.25), 0 18px 48px rgba(79,70,229,.20);
    }
  
    @media (min-width: 700px) {
      .name-grid {
        grid-template-columns: 1fr 1fr;
      }
    }
  
    @media (orientation: portrait) and (max-width: 520px) {
      .setup-screen {
        padding:
          calc(env(safe-area-inset-top, 0px) + 8px)
          calc(env(safe-area-inset-right, 0px) + 12px)
          calc(env(safe-area-inset-bottom, 0px) + 10px)
          calc(env(safe-area-inset-left, 0px) + 12px);
      }
  
      .setup-wrap {
        gap: 10px;
      }
  
      .hero {
        padding: 12px 14px;
        border-radius: 24px;
      }
  
      .badge {
        margin-bottom: 8px;
        padding: 6px 10px;
        font-size: 10.5px;
      }
  
      .hero h1 {
        margin-bottom: 4px;
        font-size: clamp(28px, 8.7vw, 44px);
      }
  
      .hero p {
        font-size: 13px;
        line-height: 1.38;
      }
  
      .setup-card {
        padding: 12px;
        gap: 10px;
        border-radius: 24px;
      }
  
      .option-grid {
        gap: 10px;
      }
  
      .input,
      .seg button {
        min-height: 46px;
        border-radius: 16px;
      }
  
      .seg button {
        font-size: 15px;
      }
  
      .rule-box {
        padding: 10px 12px;
        font-size: 12.7px;
        line-height: 1.42;
      }
  
      .start-btn {
        min-height: 52px;
        font-size: 18px;
      }
    }
  
    @media (orientation: landscape) and (max-height: 560px) {
      .setup-screen {
        padding:
          calc(env(safe-area-inset-top, 0px) + 8px)
          calc(env(safe-area-inset-right, 0px) + 16px)
          calc(env(safe-area-inset-bottom, 0px) + 8px)
          calc(env(safe-area-inset-left, 0px) + 16px);
      }
  
      .setup-wrap {
        grid-template-columns: minmax(330px, .88fr) minmax(0, 1.12fr);
        grid-template-rows: 1fr;
        gap: 12px;
      }
  
      .hero {
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 18px;
      }
  
      .badge {
        width: fit-content;
        max-width: 100%;
        margin-bottom: 10px;
        padding: 6px 10px;
        font-size: clamp(9px, 1.5vw, 11px);
        letter-spacing: .04em;
      }
  
      .hero h1 {
        font-size: clamp(27px, 4.7vw, 42px);
        line-height: 1.06;
        margin-bottom: 8px;
        max-width: 100%;
      }
  
      .hero p {
        font-size: clamp(11px, 1.65vw, 13px);
        line-height: 1.45;
      }
  
      .setup-card {
        height: 100%;
        padding: 13px;
        gap: 9px;
      }
  
      .name-grid {
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
  
      .option-grid {
        grid-template-columns: 1fr 1fr;
        gap: 10px 12px;
      }
  
      .label {
        font-size: 11px;
      }
  
      .input,
      .seg button {
        min-height: 41px;
        padding: 9px 12px;
        border-radius: 15px;
      }
  
      .seg button {
        font-size: 14px;
      }
  
      .rule-box {
        padding: 9px 12px;
        font-size: 11.8px;
        line-height: 1.38;
      }
  
      .start-btn {
        min-height: 43px;
        border-radius: 16px;
        font-size: 17px;
      }
    }
  
    @media (orientation: landscape) and (max-height: 430px) {
      .setup-wrap {
        grid-template-columns: minmax(310px, .82fr) minmax(0, 1.18fr);
        gap: 10px;
      }
  
      .hero {
        padding: 16px;
      }
  
      .badge {
        font-size: 9px;
        letter-spacing: .03em;
      }
  
      .hero h1 {
        font-size: clamp(26px, 4.3vw, 38px);
        line-height: 1.08;
      }
  
      .hero p {
        font-size: 11px;
        line-height: 1.42;
      }
  
      .setup-card {
        padding: 12px;
        gap: 8px;
      }
  
      .input,
      .seg button {
        min-height: 38px;
      }
  
      .rule-box {
        padding: 8px 10px;
        font-size: 11.2px;
      }
  
      .start-btn {
        min-height: 40px;
      }
    }
  
    /* =========================
       SCOREBOARD
       Tournament / Score-first
    ========================== */
  
    .score-screen {
      position: relative;
      flex-direction: column;
    }
  
    .topbar {
      position: absolute;
      top: calc(env(safe-area-inset-top, 0px) + 8px);
      left: calc(env(safe-area-inset-left, 0px) + var(--top-safe));
      right: calc(env(safe-area-inset-right, 0px) + var(--top-safe));
      z-index: 60;
      display: grid;
      grid-template-columns: auto minmax(210px, 1fr) auto;
      gap: 8px;
      align-items: center;
      pointer-events: none;
    }
  
    .topbar > * {
      pointer-events: auto;
    }
  
    .mini-actions {
      display: flex;
      gap: 7px;
      flex-wrap: nowrap;
      align-items: center;
    }
  
    .topbar-right {
      justify-content: flex-end;
    }
  
    .pill,
    .mini-btn {
      min-height: 38px;
      padding: 0 11px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(10,15,31,.46);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow: 0 10px 30px rgba(0,0,0,.18);
      color: rgba(255,255,255,.92);
      font-size: 13px;
      font-weight: 900;
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
  
    .pill {
      min-width: 0;
      padding-inline: 16px;
      overflow: hidden;
      text-overflow: ellipsis;
      text-align: center;
      background: rgba(10,15,31,.56);
    }
  
    .mini-btn:disabled {
      opacity: .42;
      cursor: not-allowed;
    }
  
    .primary-action {
      min-width: unset;
    }
  
    #undoBtn {
      position: fixed;
      left: 50%;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 16px);
      z-index: 80;
      transform: translateX(-50%);
      min-width: 142px;
      min-height: 62px;
      padding: 0 22px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.30);
      background:
        linear-gradient(135deg, rgba(255,255,255,.28), rgba(255,255,255,.10)),
        rgba(10,15,31,.38);
      backdrop-filter: blur(26px) saturate(1.35);
      -webkit-backdrop-filter: blur(26px) saturate(1.35);
      box-shadow:
        0 22px 52px rgba(0,0,0,.32),
        inset 0 1px 0 rgba(255,255,255,.28),
        0 0 0 5px rgba(255,255,255,.06);
      color: rgba(255,255,255,.96);
      font-size: 19px;
      font-weight: 1000;
    }
  
    #undoBtn:disabled {
      opacity: .32;
    }
  
    .court {
      position: relative;
      flex: 1;
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
    }
  
    .side {
      position: relative;
      overflow: hidden;
      min-width: 0;
      isolation: isolate;
      display: flex;
      flex-direction: column;
      padding-top: calc(env(safe-area-inset-top, 0px) + 62px);
      padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 10px);
    }
  
    .side.left {
      padding-left: 18px;
      padding-right: 14px;
    }
  
    .side.right {
      padding-left: 14px;
      padding-right: 18px;
    }
  
    .side::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -2;
      opacity: .96;
    }
  
    .side.left::before {
      background:
        radial-gradient(circle at 18% 20%, rgba(255,255,255,.14), transparent 26%),
        linear-gradient(145deg, var(--left-1), var(--left-2));
    }
  
    .side.right::before {
      background:
        radial-gradient(circle at 82% 20%, rgba(255,255,255,.14), transparent 26%),
        linear-gradient(145deg, var(--right-1), var(--right-2));
    }
  
    .side::after {
      content: "+1";
      position: absolute;
      inset: auto 22px 18px auto;
      z-index: -1;
      font-size: clamp(86px, 14vw, 160px);
      font-weight: 1000;
      opacity: .08;
      letter-spacing: -.08em;
    }
  
    .side.right::after {
      inset: auto auto 18px 22px;
    }
  
    .side.flash {
      animation: flash .18s ease;
    }
  
    @keyframes flash {
      from {
        filter: brightness(1.35);
        transform: scale(.997);
      }
      to {
        filter: brightness(1);
        transform: scale(1);
      }
    }
  
    .team-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: start;
      gap: 10px;
      min-height: 50px;
      margin-bottom: 2px;
    }
  
    .side.left .team-head {
      margin-left: var(--hud-safe);
    }
  
    .side.right .team-head {
      margin-right: var(--hud-safe);
    }
  
    .team-name {
      font-size: clamp(28px, 4vw, 44px);
      font-weight: 950;
      line-height: 1.02;
      letter-spacing: -.04em;
      text-wrap: balance;
      overflow-wrap: anywhere;
      text-shadow: 0 12px 34px rgba(0,0,0,.18);
    }
  
    .sets-badge {
      min-width: 54px;
      padding: 7px 8px;
      border-radius: 16px;
      background: rgba(255,255,255,.18);
      text-align: center;
      font-weight: 1000;
      font-size: clamp(18px, 2.2vw, 26px);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.14);
    }
  
    .sets-badge small {
      display: block;
      margin-top: 1px;
      color: rgba(255,255,255,.70);
      font-size: 10px;
      font-weight: 800;
    }
  
    .score-wrap {
      position: relative;
      flex: 1;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
  
    .score-wrap::before {
      content: "";
      position: absolute;
      width: min(54vh, 220px);
      aspect-ratio: 1;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.035);
      filter: blur(.1px);
    }
  
    .score {
      position: relative;
      z-index: 1;
      font-size: clamp(148px, 30vw, 320px);
      font-weight: 1000;
      line-height: .76;
      letter-spacing: -.105em;
      text-shadow:
        0 24px 68px rgba(0,0,0,.26),
        0 0 1px rgba(255,255,255,.18);
    }
  
    .serve-card {
      min-height: 44px;
      padding: 9px 12px;
      border-radius: 18px;
      background: rgba(0,0,0,.16);
      color: rgba(255,255,255,.88);
      font-size: clamp(12px, 1.5vw, 15px);
      font-weight: 850;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
  
    .side.left .serve-card {
      margin-right: 82px;
    }
  
    .side.right .serve-card {
      margin-left: 82px;
    }
  
    .serve-dot {
      width: 12px;
      height: 12px;
      flex: 0 0 auto;
      border-radius: 99px;
      background: rgba(255,255,255,.35);
      box-shadow: 0 0 0 4px rgba(255,255,255,.10);
    }
  
    .serving .serve-dot {
      background: var(--green);
      box-shadow:
        0 0 0 4px rgba(52,211,153,.22),
        0 0 18px rgba(52,211,153,.8);
    }
  
    .center-status {
      position: absolute;
      inset: 0;
      z-index: 25;
      pointer-events: none;
    }
  
    .round-chip {
      position: absolute;
      left: 50%;
      top: calc(env(safe-area-inset-top, 0px) + 56px);
      max-width: min(72vw, 520px);
      overflow: hidden;
      text-overflow: ellipsis;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(10,15,31,.58);
      border: 1px solid rgba(255,255,255,.18);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 12px 40px rgba(0,0,0,.25);
      color: white;
      font-weight: 950;
      font-size: 12px;
      white-space: nowrap;
      transform: translate(-50%, -8px) scale(.98);
      opacity: 0;
      visibility: hidden;
      transition: opacity .22s ease, transform .22s ease, visibility .22s ease;
    }
  
    .round-chip.show {
      opacity: 1;
      visibility: visible;
      transform: translate(-50%, 0) scale(1);
    }
  
    .round-chip.important {
      background: rgba(10,15,31,.70);
      box-shadow:
        0 12px 44px rgba(0,0,0,.30),
        0 0 0 4px rgba(255,255,255,.08);
    }
  
    .divider-line {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 2px;
      height: min(54vh, 420px);
      border-radius: 99px;
      background:
        linear-gradient(
          transparent,
          rgba(255,255,255,.22),
          rgba(255,255,255,.42),
          rgba(255,255,255,.22),
          transparent
        );
      transform: translate(-50%, -50%);
    }
  
    /* =========================
       SCOREBOARD PORTRAIT
    ========================== */
  
    @media (orientation: portrait) and (max-width: 720px) {
      :root {
        --hud-safe: 0px;
        --top-safe: 10px;
      }
  
      .topbar {
        top: calc(env(safe-area-inset-top, 0px) + 8px);
        left: calc(env(safe-area-inset-left, 0px) + 10px);
        right: calc(env(safe-area-inset-right, 0px) + 10px);
        grid-template-columns: 1fr auto;
        grid-template-areas:
          "left right"
          "info info";
        gap: 8px;
      }
  
      .topbar-left {
        grid-area: left;
      }
  
      .topbar-right {
        grid-area: right;
        justify-content: flex-end;
      }
  
      #matchInfo {
        grid-area: info;
      }
  
      .mini-btn,
      .pill {
        min-height: 40px;
        padding: 0 12px;
        font-size: 14px;
      }
  
      #undoBtn {
        left: auto;
        right: calc(env(safe-area-inset-right, 0px) + 14px);
        bottom: calc(env(safe-area-inset-bottom, 0px) + 16px);
        transform: none;
        min-width: 124px;
        min-height: 58px;
        font-size: 18px;
      }
  
      .court {
        grid-template-columns: 1fr;
        grid-template-rows: 1fr 1fr;
      }
  
      .side {
        padding-left: 12px;
        padding-right: 12px;
      }
  
      .side.left {
        padding-top: calc(env(safe-area-inset-top, 0px) + 116px);
        padding-bottom: 12px;
      }
  
      .side.right {
        padding-top: 12px;
        padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 12px);
      }
  
      .side.left .team-head,
      .side.right .team-head {
        margin-left: 0;
        margin-right: 0;
      }
  
      .team-head {
        min-height: 48px;
        margin-bottom: 4px;
      }
  
      .team-name {
        font-size: clamp(22px, 6vw, 34px);
      }
  
      .sets-badge {
        min-width: 52px;
        font-size: 22px;
      }
  
      .score {
        font-size: clamp(108px, 36vw, 198px);
      }
  
      .serve-card {
        min-height: 42px;
        font-size: 13px;
      }
  
      .side.left .serve-card,
      .side.right .serve-card {
        margin-left: 0;
        margin-right: 0;
      }
  
      .round-chip {
        top: calc(env(safe-area-inset-top, 0px) + 116px);
        max-width: min(92vw, 480px);
        font-size: 12px;
      }
  
      .divider-line {
        width: min(64vw, 360px);
        height: 2px;
      }
  
      .side::after {
        font-size: 88px;
      }
    }
  
    /* =========================
       SCOREBOARD LANDSCAPE COMPACT
    ========================== */
  
    @media (orientation: landscape) and (max-height: 560px) {
      :root {
        --hud-safe: 48px;
        --top-safe: 58px;
      }
  
      .topbar {
        top: calc(env(safe-area-inset-top, 0px) + 8px);
        left: calc(env(safe-area-inset-left, 0px) + var(--top-safe));
        right: calc(env(safe-area-inset-right, 0px) + var(--top-safe));
        grid-template-columns: auto minmax(190px, 1fr) auto;
        gap: 7px;
      }
  
      .mini-actions {
        gap: 7px;
      }
  
      .mini-btn,
      .pill {
        min-height: 38px;
        padding: 0 10px;
        font-size: 12.5px;
      }
  
      .pill {
        padding-inline: 14px;
      }
  
      .side {
        padding-top: calc(env(safe-area-inset-top, 0px) + 60px);
        padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 10px);
      }
  
      .side.left {
        padding-left: 16px;
        padding-right: 12px;
      }
  
      .side.right {
        padding-left: 12px;
        padding-right: 16px;
      }
  
      .team-head {
        min-height: 48px;
      }
  
      .team-name {
        font-size: clamp(25px, 3.7vw, 40px);
      }
  
      .sets-badge {
        min-width: 52px;
        padding: 7px 8px;
        font-size: clamp(18px, 2.1vw, 24px);
      }
  
      .score {
        font-size: clamp(136px, 28.5vw, 292px);
      }
  
      .serve-card {
        min-height: 43px;
        font-size: 12px;
      }
  
      .side.left .serve-card {
        margin-right: 78px;
      }
  
      .side.right .serve-card {
        margin-left: 78px;
      }
  
      #undoBtn {
        min-width: 136px;
        min-height: 58px;
        font-size: 18px;
        bottom: calc(env(safe-area-inset-bottom, 0px) + 13px);
      }
  
      .round-chip {
        top: calc(env(safe-area-inset-top, 0px) + 54px);
        max-width: min(76vw, 480px);
      }
    }
  
    @media (orientation: landscape) and (max-width: 940px) and (max-height: 560px) {
      :root {
        --hud-safe: 42px;
        --top-safe: 50px;
      }
  
      .topbar {
        grid-template-columns: auto minmax(170px, 1fr) auto;
        gap: 6px;
      }
  
      .mini-actions {
        gap: 6px;
      }
  
      .mini-btn,
      .pill {
        min-height: 36px;
        padding: 0 9px;
        font-size: 12px;
      }
  
      .pill {
        padding-inline: 12px;
      }
  
      .team-name {
        font-size: clamp(23px, 3.4vw, 36px);
      }
  
      .score {
        font-size: clamp(126px, 27.5vw, 265px);
      }
  
      .side.left .serve-card {
        margin-right: 72px;
      }
  
      .side.right .serve-card {
        margin-left: 72px;
      }
  
      #undoBtn {
        min-width: 128px;
        min-height: 56px;
        font-size: 17px;
      }
    }
  
    /* =========================
       MODAL
    ========================== */
  
    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 90;
      display: none;
      place-items: center;
      padding: 18px;
      background: rgba(0,0,0,.58);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
  
    .modal-backdrop.show {
      display: grid;
    }
  
    .modal {
      width: min(500px, 100%);
      padding: 20px;
      border-radius: 28px;
      border: 1px solid var(--line);
      background: rgba(15,23,42,.92);
      box-shadow: var(--shadow);
      text-align: center;
    }
  
    .modal h2 {
      margin: 6px 0 8px;
      font-size: clamp(28px, 8vw, 46px);
      letter-spacing: -.05em;
    }
  
    .modal p {
      margin: 0 0 16px;
      color: var(--muted);
      line-height: 1.55;
    }
  
    .modal-actions {
      display: grid;
      gap: 10px;
    }
  
    .modal-actions button {
      min-height: 54px;
      border-radius: 18px;
      background: rgba(255,255,255,.10);
      font-weight: 950;
    }
  
    .modal-actions .primary {
      background: linear-gradient(135deg, #4f46e5, #ec4899);
    }

    /* Remote cursor highlight */
    .remote-selected {
      outline: 4px solid rgba(255,255,255,.92) !important;
      outline-offset: -4px;
      box-shadow:
        0 0 0 8px rgba(56,189,248,.34),
        0 18px 50px rgba(0,0,0,.28) !important;
      filter: brightness(1.12);
    }
    
    .remote-selected::before {
      filter: brightness(1.12);
    }
  </style>
</head>

<body>
  <main class="app">
    <section id="setupScreen" class="screen setup-screen active" aria-label="ตั้งค่าเกม">
      <div class="setup-wrap">
        <div class="hero">
          <div class="badge">🏸 Badminton · Touch Scoreboard</div>
          <h1>นับแต้มแบดแบบแตะจอ</h1>
          <p>ตั้งค่าเกม แล้วใช้มือถือ แท็บเล็ต หรือ iPad วางข้างสนามได้เลย แตะฝั่งซ้าย/ขวาเพื่อเพิ่มแต้ม พร้อม Undo และจบเซตอัตโนมัติ</p>
        </div>

        <form id="setupForm" class="setup-card">
          <div class="name-grid">
            <div class="field">
              <span class="label">ชื่อฝั่งซ้าย</span>
              <input id="leftName" class="input" value="ทีมฟ้า" maxlength="22" autocomplete="off" />
            </div>

            <div class="field">
              <span class="label">ชื่อฝั่งขวา</span>
              <input id="rightName" class="input" value="ทีมชมพู" maxlength="22" autocomplete="off" />
            </div>
          </div>

          <div class="option-grid">
            <div class="field">
              <span class="label">ประเภทแมตช์</span>
              <div class="seg" data-group="matchType" style="--cols:2">
                <button type="button" data-value="Single">Single</button>
                <button type="button" data-value="Double" class="active">Double</button>
              </div>
            </div>

            <div class="field">
              <span class="label">แต้มต่อเซต</span>
              <div class="seg" data-group="target" style="--cols:2">
                <button type="button" data-value="11" class="active">11 แต้ม</button>
                <button type="button" data-value="21">21 แต้ม</button>
              </div>
            </div>

            <div class="field">
              <span class="label">ชนะกี่เซตถึงจบแมตช์</span>
              <div class="seg" data-group="setsToWin" style="--cols:3">
                <button type="button" data-value="1" class="active">1</button>
                <button type="button" data-value="2">2</button>
                <button type="button" data-value="3">3</button>
              </div>
            </div>

            <div class="field">
              <span class="label">ฝั่งเสิร์ฟก่อน</span>
              <div class="seg" data-group="firstServer" style="--cols:2">
                <button type="button" data-value="left" class="active">ซ้าย</button>
                <button type="button" data-value="right">ขวา</button>
              </div>
            </div>
          </div>

          <div class="rule-box" id="ruleText"></div>

          <button class="start-btn" type="submit">เริ่มนับแต้ม</button>
        </form>
      </div>
    </section>

    <section id="scoreScreen" class="screen score-screen" aria-label="หน้านับแต้ม">
      <div class="topbar">
        <div class="mini-actions topbar-left">
          <button id="homeBtn" class="mini-btn" type="button">⌂ Home</button>
          <button id="fullBtn" class="mini-btn" type="button">⛶ Full</button>
        </div>

        <div id="matchInfo" class="pill">Set 1 · 11 pts</div>

        <div class="mini-actions topbar-right">
          <button id="undoBtn" class="mini-btn primary-action" type="button">↶ Undo</button>
          <button id="swapBtn" class="mini-btn" type="button">⇄ Swap</button>
          <button id="resetBtn" class="mini-btn" type="button">Reset</button>
        </div>
      </div>

      <div class="center-status">
        <div id="statusChip" class="round-chip">แตะฝั่งที่ได้แต้ม</div>
        <div class="divider-line"></div>
      </div>

      <div class="court">
        <button id="leftSide" class="side left" type="button" aria-label="เพิ่มแต้มฝั่งซ้าย">
          <div class="team-head">
            <div id="leftTeam" class="team-name">ทีมฟ้า</div>
            <div class="sets-badge"><span id="leftSets">0</span><small>SETS</small></div>
          </div>

          <div class="score-wrap">
            <div id="leftScore" class="score">0</div>
          </div>

          <div id="leftServe" class="serve-card">
            <span class="serve-dot"></span>
            <span>รอเสิร์ฟ</span>
          </div>
        </button>

        <button id="rightSide" class="side right" type="button" aria-label="เพิ่มแต้มฝั่งขวา">
          <div class="team-head">
            <div id="rightTeam" class="team-name">ทีมชมพู</div>
            <div class="sets-badge"><span id="rightSets">0</span><small>SETS</small></div>
          </div>

          <div class="score-wrap">
            <div id="rightScore" class="score">0</div>
          </div>

          <div id="rightServe" class="serve-card">
            <span class="serve-dot"></span>
            <span>รอเสิร์ฟ</span>
          </div>
        </button>
      </div>
    </section>

    <div id="modalBackdrop" class="modal-backdrop" role="dialog" aria-modal="true">
      <div class="modal">
        <h2 id="modalTitle">จบเซต</h2>
        <p id="modalText"></p>
        <div class="modal-actions" id="modalActions"></div>
      </div>
    </div>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);

    const defaultSettings = {
      leftName: 'ทีมฟ้า',
      rightName: 'ทีมชมพู',
      matchType: 'Double',
      target: 11,
      setsToWin: 1,
      firstServer: 'left'
    };

    let settings = loadSettings();
    let state = createNewState(settings);
    let history = [];
    let modalLocked = false;
    let statusTimer = null;

    let remoteModeOn = false;
    let remoteAudio = null;
    let remoteAudioUrl = null;
    let remoteLastAt = 0;
    const REMOTE_COOLDOWN = 420;
    let remoteCursorIndex = 0;
    let remoteCursorActive = false;
    let remoteCursorLastAt = 0;
    const REMOTE_CURSOR_TIMEOUT = 4500;

    const setupScreen = $('setupScreen');
    const scoreScreen = $('scoreScreen');
    const modalBackdrop = $('modalBackdrop');

    function loadSettings() {
      try {
        return {
          ...defaultSettings,
          ...(JSON.parse(localStorage.getItem('badmintonSettings')) || {})
        };
      } catch {
        return { ...defaultSettings };
      }
    }

    function saveSettings() {
      localStorage.setItem('badmintonSettings', JSON.stringify(settings));
    }

    function saveMatch() {
      localStorage.setItem('badmintonMatch', JSON.stringify({ settings, state, history }));
    }

    function clearMatch() {
      localStorage.removeItem('badmintonMatch');
    }

    function createNewState(s) {
      return {
        leftScore: 0,
        rightScore: 0,
        leftSets: 0,
        rightSets: 0,
        currentSet: 1,
        server: s.firstServer,
        finished: false,
        setFinished: false,
        lastPoint: null
      };
    }

    function capPoint() {
      return settings.target === 21 ? 30 : 15;
    }

    function maxSetsText() {
      return settings.setsToWin === 1
        ? 'Best of 1'
        : settings.setsToWin === 2
          ? 'Best of 3'
          : 'Best of 5';
    }

    function updateRuleText() {
      const cap = capPoint();
      $('ruleText').innerHTML = `
        <b>กติกาที่ใช้:</b> Rally Point · ใครได้แต้มเป็นฝ่ายเสิร์ฟต่อ · เซตละ ${settings.target} แต้ม · ถ้าแต้มใกล้กันต้องนำ 2 แต้ม · แต้มสูงสุด ${cap} · ชนะ ${settings.setsToWin} เซตจบแมตช์ (${maxSetsText()})
      `;
    }

    function setActive(group, value) {
      document.querySelectorAll(`[data-group="${group}"] button`).forEach((btn) => {
        btn.classList.toggle('active', btn.dataset.value == value);
      });
    }

    function initSetup() {
      $('leftName').value = settings.leftName;
      $('rightName').value = settings.rightName;
      setActive('matchType', settings.matchType);
      setActive('target', settings.target);
      setActive('setsToWin', settings.setsToWin);
      setActive('firstServer', settings.firstServer);
      updateRuleText();
    }

    document.querySelectorAll('.seg button').forEach((btn) => {
      btn.addEventListener('click', () => {
        const group = btn.closest('.seg').dataset.group;
        const rawValue = btn.dataset.value;

        settings[group] = ['target', 'setsToWin'].includes(group)
          ? Number(rawValue)
          : rawValue;

        setActive(group, rawValue);
        updateRuleText();
      });
    });

    $('setupForm').addEventListener('submit', (e) => {
      e.preventDefault();

      settings.leftName = $('leftName').value.trim() || 'ทีมฟ้า';
      settings.rightName = $('rightName').value.trim() || 'ทีมชมพู';

      saveSettings();

      state = createNewState(settings);
      history = [];
      modalLocked = false;

      clearMatch();
      showScore();
    });

    function showSetup(confirmExit = false) {
      if (
        confirmExit &&
        !state.finished &&
        (state.leftScore || state.rightScore || state.leftSets || state.rightSets)
      ) {
        if (!confirm('ออกจากเกมนี้และกลับไปตั้งค่าใหม่?')) return;
      }

      disableRemoteMode(false);

      setupScreen.classList.add('active');
      scoreScreen.classList.remove('active');

      closeModal();
      initSetup();
    }

    function showScore() {
      setupScreen.classList.remove('active');
      scoreScreen.classList.add('active');

      render();
      showStatusToast(1600);
      saveMatch();

      enableRemoteMode(true).then((ok) => {
        if (ok) remoteSignal('🎮 Clicker พร้อมใช้งาน', 900);
      });
    }

    function clone(obj) {
      return JSON.parse(JSON.stringify(obj));
    }

    function addPoint(side) {
      if (modalLocked || state.finished || state.setFinished) return;

      history.push(clone(state));
      if (history.length > 80) history.shift();

      if (side === 'left') state.leftScore += 1;
      else state.rightScore += 1;

      state.server = side;
      state.lastPoint = side;

      flash(side);
      vibrate(18);
      checkSetWinner();
      render();

      if (!state.finished && !state.setFinished) {
        showStatusToast(isImportantStatus() ? 2600 : 1100);
      }

      saveMatch();
    }

    function checkSetWinner() {
      const l = state.leftScore;
      const r = state.rightScore;
      const target = settings.target;
      const cap = capPoint();

      const leftWin = (l >= target && l - r >= 2) || l === cap;
      const rightWin = (r >= target && r - l >= 2) || r === cap;

      if (!leftWin && !rightWin) return;

      const winner = leftWin ? 'left' : 'right';

      state.setFinished = true;

      if (winner === 'left') state.leftSets += 1;
      else state.rightSets += 1;

      const matchWinner =
        state.leftSets >= settings.setsToWin ||
        state.rightSets >= settings.setsToWin;

      if (matchWinner) {
        state.finished = true;
        render();
        saveMatch();
        showResultModal('match', winner);
      } else {
        render();
        saveMatch();
        showResultModal('set', winner);
      }
    }

    function team(side) {
      return side === 'left' ? settings.leftName : settings.rightName;
    }

    function scoreText() {
      return `${state.leftScore} - ${state.rightScore}`;
    }

    function showResultModal(type, winner) {
      modalLocked = true;

      const isMatch = type === 'match';

      $('modalTitle').textContent = isMatch ? 'จบแมตช์ 🎉' : 'จบเซต';
      $('modalText').textContent = isMatch
        ? `${team(winner)} ชนะ ${state.leftSets} - ${state.rightSets} เซต | คะแนนเซตล่าสุด ${scoreText()}`
        : `${team(winner)} ชนะเซตนี้ ${scoreText()} | เซต ${state.leftSets} - ${state.rightSets}`;

      const actions = $('modalActions');
      actions.innerHTML = '';

      if (!isMatch) {
        actions.appendChild(makeModalButton('เซตถัดไป', 'primary', nextSet));
      }

      actions.appendChild(makeModalButton('เริ่มแมตช์ใหม่', isMatch ? 'primary' : '', resetMatch));
      actions.appendChild(makeModalButton('กลับหน้า Home', '', () => showSetup(false)));

      modalBackdrop.classList.add('show');
    }

    function makeModalButton(text, cls, fn) {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.textContent = text;

      if (cls) btn.className = cls;

      btn.addEventListener('click', fn);
      return btn;
    }

    function closeModal() {
      modalLocked = false;
      modalBackdrop.classList.remove('show');

      const chip = $('statusChip');
      chip.classList.remove('show', 'important');

      clearTimeout(statusTimer);
    }

    function nextSet() {
      const previousServer = state.server;

      state.currentSet += 1;
      state.leftScore = 0;
      state.rightScore = 0;
      state.setFinished = false;
      state.lastPoint = null;

      state.server = previousServer;
      history = [];

      closeModal();
      render();
      showStatusToast(1600);
      saveMatch();
    }

    function resetMatch() {
      if (!state.finished && !confirm('รีเซ็ตแมตช์นี้ใหม่ทั้งหมด?')) return;

      state = createNewState(settings);
      history = [];

      closeModal();
      render();
      showStatusToast(1600);
      saveMatch();

      enableRemoteMode(true);
    }

    function undo() {
      if (!history.length) return;

      state = history.pop();

      closeModal();
      render();
      showStatusToast(1100);
      saveMatch();
    }

    function swapSides() {
      history.push(clone(state));

      [settings.leftName, settings.rightName] = [settings.rightName, settings.leftName];
      [state.leftScore, state.rightScore] = [state.rightScore, state.leftScore];
      [state.leftSets, state.rightSets] = [state.rightSets, state.leftSets];

      state.server = state.server === 'left' ? 'right' : 'left';

      state.lastPoint =
        state.lastPoint === 'left'
          ? 'right'
          : state.lastPoint === 'right'
            ? 'left'
            : null;

      saveSettings();
      render();
      saveMatch();
    }

    function serviceCourt(side) {
      const score = side === 'left' ? state.leftScore : state.rightScore;
      return score % 2 === 0 ? 'คอร์ตขวา' : 'คอร์ตซ้าย';
    }

    function render() {
      $('leftTeam').textContent = settings.leftName;
      $('rightTeam').textContent = settings.rightName;

      $('leftScore').textContent = state.leftScore;
      $('rightScore').textContent = state.rightScore;

      $('leftSets').textContent = state.leftSets;
      $('rightSets').textContent = state.rightSets;

      $('matchInfo').textContent =
        `Set ${state.currentSet} · ${settings.target} pts · ${settings.matchType} · ชนะ ${settings.setsToWin} เซต`;

      $('undoBtn').disabled = !history.length;

      const lServe = $('leftServe');
      const rServe = $('rightServe');

      lServe.classList.toggle('serving', state.server === 'left');
      rServe.classList.toggle('serving', state.server === 'right');

      lServe.lastElementChild.textContent =
        state.server === 'left'
          ? `เสิร์ฟ · ${serviceCourt('left')}`
          : 'รับลูก';

      rServe.lastElementChild.textContent =
        state.server === 'right'
          ? `เสิร์ฟ · ${serviceCourt('right')}`
          : 'รับลูก';

      $('leftSide').disabled = state.finished || state.setFinished;
      $('rightSide').disabled = state.finished || state.setFinished;

      if (state.finished) {
        const winner = state.leftSets > state.rightSets ? settings.leftName : settings.rightName;
        setStatusChip(`${winner} ชนะ Match`, true);
      } else if (state.setFinished) {
        setStatusChip(`จบ Set ${state.currentSet}`, true);
      } else {
        setStatusChip(statusText(), isImportantStatus());
      }
    }

    function setStatusChip(text, important = false) {
      const chip = $('statusChip');
      chip.textContent = text;
      chip.classList.toggle('important', important);

      if (important) {
        chip.classList.add('show');
        clearTimeout(statusTimer);
      } else {
        chip.classList.remove('important');
      }
    }

    function showStatusToast(ms = 1400) {
      const chip = $('statusChip');

      chip.classList.add('show');
      clearTimeout(statusTimer);

      if (!chip.classList.contains('important')) {
        statusTimer = setTimeout(() => {
          chip.classList.remove('show');
        }, ms);
      }
    }

    function isImportantStatus() {
      const l = state.leftScore;
      const r = state.rightScore;
      const target = settings.target;
      const cap = capPoint();

      return (
        (l === r && l >= target - 1) ||
        (Math.max(l, r) >= target - 1 && Math.abs(l - r) === 1) ||
        Math.max(l, r) === cap - 1
      );
    }

    function statusText() {
      const l = state.leftScore;
      const r = state.rightScore;
      const target = settings.target;
      const cap = capPoint();

      if (l === r && l >= target - 1) return 'Deuce · ต้องนำ 2 แต้ม';
      if (Math.max(l, r) >= target - 1 && Math.abs(l - r) === 1) return 'Game Point';
      if (Math.max(l, r) === cap - 1) return 'แต้มสุดท้าย';

      return `เสิร์ฟ: ${team(state.server)} · แตะฝั่งที่ได้แต้ม`;
    }

    function flash(side) {
      const el = side === 'left' ? $('leftSide') : $('rightSide');

      el.classList.remove('flash');
      void el.offsetWidth;
      el.classList.add('flash');
    }

    function vibrate(ms) {
      if ('vibrate' in navigator) navigator.vibrate(ms);
    }

    async function toggleFullscreen() {
      try {
        if (!document.fullscreenElement) {
          await document.documentElement.requestFullscreen();
        } else {
          await document.exitFullscreen();
        }
      } catch (e) {
        alert('ถ้าเป็น iPhone/Safari อาจไม่รองรับ Fullscreen API ให้กด Add to Home Screen แทนครับ');
      }
    }

    /* =========================
       CLICKER / MEDIA SESSION
       JX-11:
       Previous Track = Left +1
       Next Track = Right +1
    ========================== */

    function createSilentWavUrl() {
      const sampleRate = 8000;
      const seconds = 1;
      const numSamples = sampleRate * seconds;
      const bytesPerSample = 2;
      const blockAlign = bytesPerSample;
      const byteRate = sampleRate * blockAlign;
      const dataSize = numSamples * bytesPerSample;

      const buffer = new ArrayBuffer(44 + dataSize);
      const view = new DataView(buffer);

      function writeString(offset, text) {
        for (let i = 0; i < text.length; i++) {
          view.setUint8(offset + i, text.charCodeAt(i));
        }
      }

      writeString(0, 'RIFF');
      view.setUint32(4, 36 + dataSize, true);
      writeString(8, 'WAVE');
      writeString(12, 'fmt ');
      view.setUint32(16, 16, true);
      view.setUint16(20, 1, true);
      view.setUint16(22, 1, true);
      view.setUint32(24, sampleRate, true);
      view.setUint32(28, byteRate, true);
      view.setUint16(32, blockAlign, true);
      view.setUint16(34, 16, true);
      writeString(36, 'data');
      view.setUint32(40, dataSize, true);

      return URL.createObjectURL(new Blob([view], { type: 'audio/wav' }));
    }

    async function ensureRemoteAudioPlaying() {
      if (!remoteAudioUrl) {
        remoteAudioUrl = createSilentWavUrl();
      }

      if (!remoteAudio) {
        remoteAudio = new Audio(remoteAudioUrl);
        remoteAudio.loop = true;
        remoteAudio.preload = 'auto';
        remoteAudio.setAttribute('playsinline', '');
      }

      try {
        await remoteAudio.play();
        return true;
      } catch (err) {
        console.warn('Remote audio play failed:', err);
        return false;
      }
    }

    function safeSetMediaAction(action, handler) {
      try {
        navigator.mediaSession.setActionHandler(action, handler);
      } catch (err) {
        console.warn(`Media action not supported: ${action}`, err);
      }
    }

    function clearMediaAction(action) {
      try {
        navigator.mediaSession.setActionHandler(action, null);
      } catch (err) {
        console.warn(`Cannot clear media action: ${action}`, err);
      }
    }

    function remoteSignal(text, ms = 1000) {
      setStatusChip(text, false);
      showStatusToast(ms);
    }

    function remoteAddPoint(side) {
      if (!scoreScreen.classList.contains('active')) return;

      const now = Date.now();
      if (now - remoteLastAt < REMOTE_COOLDOWN) return;

      remoteLastAt = now;

      addPoint(side);
      remoteSignal(`🎮 ${team(side)} +1`, 800);
    }

    function remoteUndo() {
      if (!scoreScreen.classList.contains('active')) return;

      const now = Date.now();
      if (now - remoteLastAt < REMOTE_COOLDOWN) return;

      remoteLastAt = now;

      undo();
      remoteSignal('🎮 Undo', 800);
    }

    function getRemoteTargets() {
      const targets = [
        {
          id: 'leftSide',
          label: `${settings.leftName} +1`,
          run: () => addPoint('left')
        },
        {
          id: 'rightSide',
          label: `${settings.rightName} +1`,
          run: () => addPoint('right')
        },
        {
          id: 'undoBtn',
          label: 'Undo',
          run: () => undo()
        },
        {
          id: 'swapBtn',
          label: 'Swap',
          run: () => swapSides()
        },
        {
          id: 'resetBtn',
          label: 'Reset',
          run: () => resetMatch()
        },
        {
          id: 'homeBtn',
          label: 'Home',
          run: () => showSetup(true)
        },
        {
          id: 'fullBtn',
          label: 'Full screen',
          run: () => toggleFullscreen()
        }
      ];
    
      return targets.filter((item) => {
        const el = $(item.id);
        if (!el) return false;
        if (el.disabled) return false;
        return scoreScreen.classList.contains('active');
      });
    }
    
    function clearRemoteCursor() {
      document.querySelectorAll('.remote-selected').forEach((el) => {
        el.classList.remove('remote-selected');
      });
    }
    
    function updateRemoteCursor() {
      const targets = getRemoteTargets();
    
      clearRemoteCursor();
    
      if (!targets.length) return;
    
      if (remoteCursorIndex < 0) remoteCursorIndex = targets.length - 1;
      if (remoteCursorIndex >= targets.length) remoteCursorIndex = 0;
    
      const target = targets[remoteCursorIndex];
      const el = $(target.id);
    
      if (!el) return;
    
      el.classList.add('remote-selected');
    
      remoteCursorActive = true;
      remoteCursorLastAt = Date.now();
    
      remoteSignal(`🎮 เลือก: ${target.label}`, 1000);
    }
    
    function moveRemoteCursor(direction = 1) {
      const targets = getRemoteTargets();
      if (!targets.length) return;
    
      remoteCursorIndex += direction;
    
      if (remoteCursorIndex < 0) remoteCursorIndex = targets.length - 1;
      if (remoteCursorIndex >= targets.length) remoteCursorIndex = 0;
    
      updateRemoteCursor();
    }
    
    function activateRemoteCursorTarget() {
      const targets = getRemoteTargets();
      if (!targets.length) return false;
    
      if (remoteCursorIndex < 0) remoteCursorIndex = targets.length - 1;
      if (remoteCursorIndex >= targets.length) remoteCursorIndex = 0;
    
      const target = targets[remoteCursorIndex];
    
      clearRemoteCursor();
      remoteCursorActive = false;
    
      remoteSignal(`🎮 กด: ${target.label}`, 900);
      target.run();
    
      return true;
    }
    
    function remoteUndoOrSelect() {
      const cursorStillActive =
        remoteCursorActive &&
        Date.now() - remoteCursorLastAt <= REMOTE_CURSOR_TIMEOUT;
    
      if (cursorStillActive) {
        activateRemoteCursorTarget();
        return;
      }
    
      remoteUndo();
    }

    async function enableRemoteMode(auto = false) {
      if (remoteModeOn) return true;

      if (!('mediaSession' in navigator)) {
        if (!auto) alert('เครื่อง/เบราว์เซอร์นี้ยังไม่รองรับ Media Session API ครับ');
        return false;
      }

      const audioReady = await ensureRemoteAudioPlaying();

      if (!audioReady) {
        if (!auto) alert('เปิด Clicker Mode ไม่สำเร็จครับ');
        return false;
      }

      if ('MediaMetadata' in window) {
        navigator.mediaSession.metadata = new MediaMetadata({
          title: 'Badminton Scoreboard',
          artist: 'Clicker Remote Mode',
          album: 'SpondFlow Court'
        });
      }

      safeSetMediaAction('previoustrack', () => {
        remoteAddPoint('left');
      });

      safeSetMediaAction('nexttrack', () => {
        remoteAddPoint('right');
      });

      // ปุ่มวงกลมค้าง 1 วิ:
      // ถ้าเพิ่งใช้ลูกกลิ้งเลือก cursor = กดปุ่มที่เลือก
      // ถ้าไม่ได้เลือก cursor = Undo
      safeSetMediaAction('play', () => {
        remoteUndoOrSelect();
      });
      
      safeSetMediaAction('pause', () => {
        remoteUndoOrSelect();
      });
      
      safeSetMediaAction('stop', () => {
        remoteUndoOrSelect();
      });
      
      // ลูกกลิ้ง / คำสั่ง seek:
      // ถ้า JX-11 ส่ง action เหล่านี้เข้ามา จะใช้เป็น cursor ได้ทันที
      safeSetMediaAction('seekbackward', () => {
        moveRemoteCursor(-1);
      });
      
      safeSetMediaAction('seekforward', () => {
        moveRemoteCursor(1);
      });
      
      safeSetMediaAction('seekto', (details) => {
        console.log('seekto details:', details);
        moveRemoteCursor(1);
      });
      
      // เผื่อ iOS/Safari หรือรีโมทบางโหมดตีความเป็น slide remote
      safeSetMediaAction('previousslide', () => {
        moveRemoteCursor(-1);
      });
      
      safeSetMediaAction('nextslide', () => {
        moveRemoteCursor(1);
      });

      navigator.mediaSession.playbackState = 'playing';
      remoteModeOn = true;

      if (!auto) {
        remoteSignal('🎮 Clicker พร้อมใช้งาน', 1200);
      }

      return true;
    }

    function disableRemoteMode(showToast = true) {
      if ('mediaSession' in navigator) {
        [
          'previoustrack',
          'nexttrack',
          'play',
          'pause',
          'stop',
          'seekbackward',
          'seekforward',
          'seekto',
          'previousslide',
          'nextslide'
        ].forEach(clearMediaAction);
        
        clearRemoteCursor();
        remoteCursorActive = false;

        try {
          navigator.mediaSession.playbackState = 'none';
        } catch {}
      }

      if (remoteAudio) {
        remoteAudio.pause();
        remoteAudio.currentTime = 0;
      }

      remoteModeOn = false;

      if (showToast && scoreScreen.classList.contains('active')) {
        remoteSignal('ปิด Clicker Mode แล้ว', 900);
      }
    }

    /* =========================
       EVENT LISTENERS
    ========================== */

    $('leftSide').addEventListener('click', () => addPoint('left'));
    $('rightSide').addEventListener('click', () => addPoint('right'));
    $('undoBtn').addEventListener('click', undo);
    $('swapBtn').addEventListener('click', swapSides);
    $('resetBtn').addEventListener('click', resetMatch);
    $('homeBtn').addEventListener('click', () => showSetup(true));
    $('fullBtn').addEventListener('click', toggleFullscreen);

    window.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();

      if (key === 'a' || key === 'arrowleft') addPoint('left');
      if (key === 'l' || key === 'arrowright') addPoint('right');
      if ((e.ctrlKey || e.metaKey) && key === 'z') undo();
      if (key === 'r') resetMatch();
    });

    let lastTouch = 0;

    document.addEventListener('touchend', (e) => {
      const now = Date.now();

      if (now - lastTouch <= 280) e.preventDefault();

      lastTouch = now;
    }, { passive: false });

    window.addEventListener('pagehide', () => {
      disableRemoteMode(false);
    });

    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        disableRemoteMode(false);
      }
    });

    initSetup();

    try {
      const saved = JSON.parse(localStorage.getItem('badmintonMatch'));

      if (
        saved &&
        saved.state &&
        (saved.state.leftScore || saved.state.rightScore || saved.state.leftSets || saved.state.rightSets)
      ) {
        if (confirm('พบเกมที่นับค้างไว้ ต้องการโหลดต่อไหม?')) {
          settings = { ...defaultSettings, ...saved.settings };
          state = saved.state;
          history = saved.history || [];
          showScore();
        }
      }
    } catch {}
  </script>
</body>
</html>
